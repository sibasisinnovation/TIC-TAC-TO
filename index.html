<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    text-align:center;
    width:380px;
}

h1{
    margin-bottom:15px;
}

.scoreboard{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-weight:bold;
}

.status{
    margin-bottom:15px;
    font-size:18px;
}

.board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:20px;
}

.cell{
    width:100px;
    height:100px;
    background:#f2f2f2;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2.5rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.cell:hover{
    background:#dfe6ff;
    transform:scale(1.05);
}

.winning-line{
    position:absolute;
    height:5px;
    background:red;
    border-radius:5px;
    transform-origin:left;
    transform:scaleX(0);
    transition:transform 0.4s ease;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#1e3c72,#2a5298);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@media(max-width:400px){
    .container{width:95%;}
    .cell{width:80px;height:80px;}
}
</style>
</head>
<body>

<div class="container">
    <h1>🎮 Tic Tac Toe</h1>

    <div class="scoreboard">
        <div>X Score: <span id="scoreX">0</span></div>
        <div>O Score: <span id="scoreO">0</span></div>
    </div>

    <div class="status" id="status">Player X's Turn</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
        <div class="winning-line" id="line"></div>
    </div>

    <button onclick="restartGame()">Restart</button>
</div>

<!-- Sound Effects -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const cells = document.querySelectorAll('.cell');
const statusText = document.getElementById('status');
const scoreX = document.getElementById('scoreX');
const scoreO = document.getElementById('scoreO');
const line = document.getElementById('line');
const clickSound = document.getElementById('clickSound');
const winSound = document.getElementById('winSound');

let currentPlayer = 'X';
let gameState = ["","","","","","","","",""];
let gameActive = true;
let xScore = 0;
let oScore = 0;

const winPatterns = [
    {combo:[0,1,2], pos:{top:50,left:0,width:300,rotate:0}},
    {combo:[3,4,5], pos:{top:160,left:0,width:300,rotate:0}},
    {combo:[6,7,8], pos:{top:270,left:0,width:300,rotate:0}},
    {combo:[0,3,6], pos:{top:0,left:50,width:300,rotate:90}},
    {combo:[1,4,7], pos:{top:0,left:160,width:300,rotate:90}},
    {combo:[2,5,8], pos:{top:0,left:270,width:300,rotate:90}},
    {combo:[0,4,8], pos:{top:0,left:0,width:420,rotate:45}},
    {combo:[2,4,6], pos:{top:0,left:300,width:420,rotate:-45}}
];

function checkWinner(){
    for(let pattern of winPatterns){
        const [a,b,c] = pattern.combo;
        if(gameState[a] && gameState[a]===gameState[b] && gameState[a]===gameState[c]){
            gameActive=false;
            drawLine(pattern.pos);
            winSound.play();

            if(currentPlayer==='X'){
                xScore++;
                scoreX.textContent=xScore;
            }else{
                oScore++;
                scoreO.textContent=oScore;
            }

            statusText.textContent=`🎉 Player ${currentPlayer} Wins!`;
            return;
        }
    }

    if(!gameState.includes("")){
        gameActive=false;
        statusText.textContent="It's a Draw!";
    }
}

function drawLine(pos){
    line.style.top=pos.top+"px";
    line.style.left=pos.left+"px";
    line.style.width=pos.width+"px";
    line.style.transform=`rotate(${pos.rotate}deg) scaleX(1)`;
}

function handleClick(e){
    const index=e.target.dataset.index;
    if(gameState[index]!=="" || !gameActive) return;

    gameState[index]=currentPlayer;
    e.target.textContent=currentPlayer;
    clickSound.play();

    checkWinner();

    currentPlayer=currentPlayer==="X"?"O":"X";
    if(gameActive){
        statusText.textContent=`Player ${currentPlayer}'s Turn`;
    }
}

function restartGame(){
    gameState=["","","","","","","","",""];
    gameActive=true;
    currentPlayer="X";
    statusText.textContent="Player X's Turn";
    cells.forEach(cell=>cell.textContent="");
    line.style.transform="scaleX(0)";
}

cells.forEach(cell=>cell.addEventListener("click",handleClick));
</script>

</body>
</html>
